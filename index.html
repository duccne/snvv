<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Ngày Đặc Biệt!</title>
    <style>
        /* CSS để làm đẹp */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fceabb, #f8b500); /* Màu nền gradient */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 10;
            max-width: 400px;
            animation: fadeIn 2s ease-in;
        }

        h1 {
            color: #e91e63;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .btn {
            background: #e91e63;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        /* Hiệu ứng pháo hoa đơn giản */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: red;
            top: -10px;
            border-radius: 50%;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="title">Chúc Mừng Ngày Lễ!</h1>
        <p id="message">Chúc bạn một ngày thật hạnh phúc, ngập tràn niềm vui và những điều bất ngờ tuyệt vời nhất!</p>
        <button class="btn" onclick="createConfetti()">Nhấn để nhận quà 🎁</button>
    </div>

    <script>
        // Hàm tạo hiệu ứng tung hoa (confetti)
        function createConfetti() {
            const colors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93'];
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.opacity = Math.random();
                
                document.body.appendChild(confetti);

                // Xóa sau khi rơi xong để tránh lag máy
                setTimeout(() => { confetti.remove(); }, 5000);
            }
        }
    </script>
</body>

</html>
